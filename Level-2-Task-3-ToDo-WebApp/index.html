<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PVS Task Manager</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<header>

<h1>PVS Task Manager</h1>

<p>Organize your work. Stay productive.</p>

</header>

<!-- Dashboard -->

<section class="dashboard">

<div class="card">

<h2 id="totalTasks">0</h2>

<p>Total Tasks</p>

</div>

<div class="card">

<h2 id="completedTasks">0</h2>

<p>Completed</p>

</div>

<div class="card">

<h2 id="pendingTasks">0</h2>

<p>Pending</p>

</div>

</section>

<!-- Add Task -->

<section class="task-form">

<input
type="text"
id="taskInput"
placeholder="Enter your task...">

<select id="priority">

<option value="High">High Priority</option>

<option value="Medium">Medium Priority</option>

<option value="Low">Low Priority</option>

</select>

<input
type="date"
id="dueDate">

<button id="addTask">

<i class="fa-solid fa-plus"></i>

Add Task

</button>

</section>

<!-- Search -->

<section class="search-section">

<input
type="text"
id="searchInput"
placeholder="Search task...">

</section>

<!-- Filter -->

<section class="filters">

<button class="filter active" data-filter="all">

All

</button>

<button class="filter" data-filter="completed">

Completed

</button>

<button class="filter" data-filter="pending">

Pending

</button>

</section>

<!-- Task List -->

<section>

<ul id="taskList">

</ul>

</section>

<footer>

<p>

Designed & Developed by

<strong>P.V. Sree Charan Reddy</strong>

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
